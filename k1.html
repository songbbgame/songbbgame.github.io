<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Songbbtest</title>

<style>



canvas {
    position: absolute;
    width: 100%;
    z-index: -1;
    margin: 0 auto;

}

body {
	
    position: absolute;
    width:100%;
    height: 100%;
    content-zooming: none;
	margin: 0px;
	padding: :0px;
	filter: blur(0vw);
	opacity: 1;
	animation:a1 2s;
-moz-animation:a1 2s;
-webkit-animation:a1 2s; 
-o-animation:a1 2s; 
}

html {
	height:100%;
}

	div {
		background-color:rgba(202,225,224,1.00) ;
		text-align: center;
		color: rgba(248,255,252,1.00);
		width:60%;
		padding: 3% 3%;
		font-size:5vw;
		border-radius: 7%;
		background: rgba(0,0,0,0.25);
		box-shadow: -1vw -1vw 3vw 0.1vw rgba(139,255,161,0.63) inset,
		1vw 1vw 3vw 0.1vw rgba(139,210,255,0.63) inset,
		0 0 3vw 1vw rgba(189,255,234,0.23);
		display:inline-block;

	}
	
	@keyframes a1
{
0%  {filter: blur(2vw);opacity:0;}
50%  {filter: blur(0.3vw);opacity: 1;}
100%  {filter: blur(0vw);}
}

@-moz-keyframes a1
{
0%   {color: rgba(248,255,252,0.00);}
25%  {color: rgba(255,255,255,1.00);text-shadow:0 0 0vw #rgba(0,0,0,0);}
50%  {color: rgba(255,255,255,1.00);text-shadow:0 0 5vw #FFF;}
100% {color: rgba(248,255,252,1.00);text-shadow:0 0 0vw #rgba(0,0,0,0);}
}

@-webkit-keyframes a1
{
0%   {color: rgba(248,255,252,0.00);}
25%  {color: rgba(255,255,255,1.00);text-shadow:0 0 0vw #rgba(0,0,0,0);}
50%  {color: rgba(255,255,255,1.00);text-shadow:0 0 5vw #FFF;}
100% {color: rgba(248,255,252,1.00);text-shadow:0 0 0vw #rgba(0,0,0,0);}
}

@-o-keyframes a1
{
0%   {color: rgba(248,255,252,0.00);}
25%  {color: rgba(255,255,255,1.00);text-shadow:0 0 0vw #rgba(0,0,0,0);}
50%  {color: rgba(255,255,255,1.00);text-shadow:0 0 5vw #FFF;}
100% {color: rgba(248,255,252,1.00);text-shadow:0 0 0vw #rgba(0,0,0,0);}
}
	
</style>

</head>

<body>
	<canvas  id="c1" width="1024" height="2048"> </canvas>
	<script>var c=document.getElementById("c1");var ww=c.width;var hh=c.height;var c2=c.getContext("2d");c2.shadowBlur=50;c2.shadowColor='rgba(0,0,0,1.00)';for(i=12;i>=0;i=i-1){for(i2=5;i2>=0;i2=i2-1){c2.shadowColor='rgba(0,0,0,0.6)';c2.shadowBlur=75;var sb=Math.random();sb=Math.ceil(sb*2000)%55+115;var g1=c2.createRadialGradient(256*i2,300*i+150*(i2%2),161,256*i2,300*i+150*(i2%2),211);g1.addColorStop(0,'rgba('+35+','+85+','+sb+',1)');g1.addColorStop(1,'rgba('+25+','+35+','+(sb-22)+',1)');c2.fillStyle=g1;c2.beginPath();c2.arc(256*i2,300*i+150*(i2%2),195,0,6.3,true);c2.closePath();c2.fill()}}
	
	</script>
	
	<center><br><br><br>
	<div style="font-size:10vw;">林鱼创意</div><br><br><br><br>
	<div style="width: 30%">选项一</div>&nbsp&nbsp&nbsp&nbsp&nbsp<div style="width: 30%">选项2</div><br><br>
		<div style="width: 30%">选项3</div>&nbsp&nbsp&nbsp&nbsp&nbsp<div style="width: 30%">选项4</div><br><br>
		<div style="width: 18%">选项5</div>&nbsp&nbsp&nbsp<div style="width: 18%">选项6</div>&nbsp&nbsp&nbsp<div style="width: 18%">选项6</div>
	
	</center>


	
</body>
	
</html>
